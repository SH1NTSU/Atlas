# Atlas Model Configuration
# Target: RTX 3060 Ti 8GB VRAM

model:
  name: "atlas-150m"
  arch: "llama"

  # Architecture params (~150M parameters)
  vocab_size: 32000
  hidden_size: 768
  intermediate_size: 2048        # SwiGLU FFN inner dim
  num_hidden_layers: 14
  num_attention_heads: 12
  num_key_value_heads: 4         # GQA: 4 KV heads (saves memory)
  max_position_embeddings: 2048
  rope_theta: 10000.0
  rms_norm_eps: 1.0e-5
  hidden_act: "silu"             # SwiGLU activation
  tie_word_embeddings: true      # Share input/output embeddings (saves params)

tokenizer:
  type: "bpe"
  vocab_size: 32000
  special_tokens:
    pad: "<pad>"
    bos: "<s>"
    eos: "</s>"
    unk: "<unk>"
    # Instruction tokens
    system: "<|system|>"
    user: "<|user|>"
    assistant: "<|assistant|>"
    end_turn: "<|end|>"

training:
  # Phase 1: Pretraining (next-token prediction on raw code)
  pretrain:
    batch_size: 8                # Per-GPU batch size
    gradient_accumulation_steps: 8  # Effective batch = 64
    learning_rate: 3.0e-4
    min_learning_rate: 3.0e-5
    warmup_steps: 1000
    max_steps: 100000            # ~6.5B tokens at batch=64, seq=1024
    weight_decay: 0.1
    max_grad_norm: 1.0
    lr_scheduler: "cosine"
    precision: "fp16"
    seq_length: 1024             # Start with 1024, extend to 2048 later

  # Phase 2: Instruction fine-tuning
  instruct:
    batch_size: 4
    gradient_accumulation_steps: 4
    learning_rate: 2.0e-5
    warmup_steps: 200
    max_steps: 5000
    seq_length: 2048
    lora:
      enabled: true
      rank: 32
      alpha: 64
      target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
      dropout: 0.05

data:
  languages:
    - typescript   # React, Next.js (TSX/JSX)
    - go
    - rust
    - bash         # Shell scripts, commands
  config_formats:
    - dockerfile
    - yaml
    - toml
    - nginx
    - json
  sources:
    - name: "the-stack-v2"
      subset: "filtered"
    - name: "own-repos"
      path: "data/own/"
